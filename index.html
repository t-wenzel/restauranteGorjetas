<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Gorjeta</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="caixaMaster">
        <h1>Calculadora de Gorjetas</h1>
        <div class="conteudo">
            <form action="#" onsubmit="event.preventDefault()" >
                <label for="valorConta">Valor da conta:</label>
                <input type="number" name="valorConta" id="valorConta" placeholder="R$"></input>
                <label for="qualidadeServico">Qualidade do serviço:</label>
                <select id="valorQualidade" name="valorQualidade">
                    <option value="excelente">Excelente</option>
                    <option value="otimo">Ótimo</option>
                    <option value="bom">Bom</option>
                    <option value="ruim">Ruim</option>
                </select>
                <input type="submit" value="Calcular Gorjeta" onclick="enviarForm()"></input>
            </form>
            <h2>Valor da conta:</h2>
            <p class="resultado" id="valorContaDisplay">&nbsp;</p>
            <h2>Qualidade do serviço:</h2>
            <p class="resultado" id="qualidadeServicoDisplay">&nbsp;</p>
            <h2>Valor da Gorjeta:</h2>
            <p class="resultado" id="valorGorjeta">&nbsp;</p>
            <h2>Valor Total:</h2>
            <p class="resultado" id="valorTotal">&nbsp;</p>
        </div>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
